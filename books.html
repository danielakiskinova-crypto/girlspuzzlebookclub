<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>All books — Girl Book Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #fff7fb; }
  * { box-sizing: border-box; }
  ::selection { background: oklch(0.9 0.06 12); }
  @keyframes gbcPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.55; } }
  .gbc-pulse { animation: gbcPulse 1.3s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .gbc-pulse { animation: none; } }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  @media (max-width: 920px) { .grid-3 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 620px) { .grid-3 { grid-template-columns: 1fr; } }
  .chip { cursor: pointer; border: none; font-family: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="site/image-slot.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="site/data.jsx"></script>
<script type="text/babel" src="site/kit.jsx"></script>

<script type="text/babel">
const { PETALS, INK, SOFT, F_HEAD, F_BODY, HERO_GRAD, Pill, Nav, Footer, BookCard } = window;
const { useState } = React;

const FILTERS = [
  { key: 'all',  label: 'Everything',  hue: 'rose',  test: () => true },
  { key: 'easy', label: 'Gentle (1–2)', hue: 'mint', test: b => b.difficulty <= 2 },
  { key: 'mid',  label: 'A challenge (3)', hue: 'sky', test: b => b.difficulty === 3 },
  { key: 'hard', label: 'Tricky (4–5)', hue: 'berry', test: b => b.difficulty >= 4 },
];

function Catalog() {
  const [active, setActive] = useState('all');
  const flt = FILTERS.find(f => f.key === active);
  const books = window.BOOKS.filter(flt.test);
  return (
    <div style={{ fontFamily: F_BODY, color: INK }}>
      <Nav active="Books" />
      <header style={{ maxWidth: 1180, margin: '0 auto', padding: '14px 24px 0' }}>
        <div style={{ borderRadius: 32, padding: '40px 44px', background: HERO_GRAD }}>
          <Pill bg="#fff" color={PETALS.coral.ink}>🧩 the whole shelf</Pill>
          <h1 style={{ fontFamily: F_HEAD, fontSize: 'clamp(34px, 4vw, 46px)', fontWeight: 600,
            margin: '16px 0 10px', lineHeight: 1.05 }}>Every book we’ve tested</h1>
          <p style={{ fontSize: 16, color: '#6b5f67', fontWeight: 600, maxWidth: 560, margin: 0, lineHeight: 1.6 }}>
            Sorted by how hard they made us think. Tap a level to filter — every one earned its place, so you can’t
            go wrong.</p>
        </div>
      </header>

      <div style={{ maxWidth: 1180, margin: '0 auto', padding: '26px 44px 6px',
        display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
        {FILTERS.map(f => {
          const on = active === f.key;
          const p = PETALS[f.hue];
          const count = window.BOOKS.filter(f.test).length;
          return (
            <button key={f.key} className="chip" onClick={() => setActive(f.key)}
              style={{ padding: '10px 18px', borderRadius: 999, fontSize: 14, fontWeight: 800,
                color: on ? p.on : p.ink, background: on ? p.ink : p.soft,
                boxShadow: on ? `0 8px 18px color-mix(in oklch, ${p.ink} 35%, transparent)` : 'none' }}>
              {f.label} <span style={{ opacity: 0.7 }}>· {count}</span>
            </button>
          );
        })}
      </div>

      <section className="grid-3" style={{ maxWidth: 1180, margin: '0 auto', padding: '18px 44px 10px' }}>
        {books.map((b, i) => <BookCard key={b.id} book={b} i={i} />)}
      </section>

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Catalog />);
</script>
</body>
</html>
