<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Watch — Girl Book Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #fff7fb; }
  * { box-sizing: border-box; }
  ::selection { background: oklch(0.9 0.06 12); }
  .video-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; align-items: start; }
  @media (max-width: 1100px) { .video-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px)  { .video-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px)  { .video-grid { grid-template-columns: 1fr; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="site/image-slot.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="site/data.jsx"></script>
<script type="text/babel" src="site/kit.jsx"></script>

<script type="text/babel">
const { PETALS, INK, SOFT, F_HEAD, F_BODY, HERO_GRAD, Pill, Nav, Footer, TikTokGrid } = window;

function Watch() {
  return (
    <div style={{ fontFamily: F_BODY, color: INK }}>
      <Nav active="TikTok" />
      <header style={{ maxWidth: 1180, margin: '0 auto', padding: '14px 24px 0' }}>
        <div style={{ borderRadius: 32, padding: '44px 44px', background: HERO_GRAD, textAlign: 'center' }}>
          <Pill bg="#fff" color={PETALS.berry.ink}>🎬 straight from our table</Pill>
          <h1 style={{ fontFamily: F_HEAD, fontSize: 'clamp(34px, 4.4vw, 48px)', fontWeight: 600,
            margin: '16px auto 10px', lineHeight: 1.05, maxWidth: 680 }}>Watch us puzzle it out</h1>
          <p style={{ fontSize: 16.5, color: '#6b5f67', fontWeight: 600, lineHeight: 1.6, maxWidth: 560, margin: '0 auto 22px' }}>
            The laughs, the dead-ends and the happy-dance moments — all our solve clips in one place.
            Spoiler-free, we promise.</p>
          <a href="https://www.tiktok.com/@girlspuzzlebookclub" target="_blank" rel="noopener"
            style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: INK, color: '#fff',
              padding: '13px 26px', borderRadius: 999, fontSize: 15, fontWeight: 800, textDecoration: 'none' }}>
            Follow us on TikTok →</a>
        </div>
      </header>

      <section style={{ maxWidth: 1180, margin: '0 auto', padding: '34px 44px 10px' }}>
        <TikTokGrid urls={window.VIDEOS} />
      </section>

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Watch />);
</script>
</body>
</html>
